name: Regenerate SNMP config

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snmp-generate.yaml"
      - "apps/prod/snmp-exporter/generator/**"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.53.2/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Generate snmp config
        working-directory: apps/prod/snmp-exporter/generator
        run: make generate

      - name: Update snmp config file
        run: |
          CHECKSUM=$(sha256sum apps/prod/snmp-exporter/generator/output/snmp.yaml | awk '{print $1}')
          cp apps/prod/snmp-exporter/generator/output/snmp.yaml apps/prod/snmp-exporter/snmp.yaml
          yq e ".spec.values.podAnnotations[\"checksum/snmp-config\"] = \"$CHECKSUM\"" \
            -i apps/prod/snmp-exporter/release.yaml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet apps/prod/snmp-exporter/ || (
            git add apps/prod/snmp-exporter/ &&
            git commit -m "chore: regenerate snmp config" &&
            git push
          )
