creation_rules:
  # Talos rule first — SOPS stops at the first match, and talos files need
  # a broader encrypted_regex than the generic *.sops.yaml rule below
  - path_regex: "^talos/(.*.yaml|talosconfig)$"
    encrypted_regex: "(?i)(key|crt|token|secret|ca|id|password)$"
    age: "age1p0qkg3hk5uey8wpd8phg997fy38jxfds2yjse5xw22eej9gjsd0qfssfua"
  - path_regex: ".*.sops.yaml$"
    encrypted_regex: "^(data|stringData)$"
    age: "age1p0qkg3hk5uey8wpd8phg997fy38jxfds2yjse5xw22eej9gjsd0qfssfua"
