apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: jellyfin-route
  namespace: prod
spec:
  hostnames:
    - "jellyfin.va1.uk"  # Replace with your desired external URL
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellyfin
          port: 8096
