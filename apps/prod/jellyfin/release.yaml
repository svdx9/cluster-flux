---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system
      interval: 12h
  values:
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: iscsi
        accessMode: ReadWriteOnce
        size: 10Gi
      media:
        enabled: true
        type: pvc
        storageClass: iscsi
        accessMode: ReadWriteOnce
        size: 50Gi
      cache:
        enabled: false
    ingress:
      enabled: false
    service:
      ports:
        minio-api:
          port: 9000
          targetPort: 9000
          protocol: TCP
        minio-console:
          port: 9001
          targetPort: 9001
          protocol: TCP
    extraVolumeMounts:
      - name: media
        mountPath: /data
    extraContainers:
      - name: minio
        image: minio/minio:latest
        args:
          - server
          - /data
          - --console-address
          - :9001
        env:
          - name: MINIO_ROOT_USER
            value: minioadmin
          - name: MINIO_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: jellyfin-minio-credentials
                key: MINIO_ROOT_PASSWORD
        ports:
          - containerPort: 9000
            name: api
          - containerPort: 9001
            name: console
        volumeMounts:
          - name: media
            mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
