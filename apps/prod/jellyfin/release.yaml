---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system
      interval: 12h
  values:
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: iscsi
        accessMode: ReadWriteOnce
        size: 10Gi
      media:
        enabled: true
        type: pvc
        storageClass: iscsi
        accessMode: ReadWriteOnce
        size: 50Gi
      cache:
        enabled: false
    ingress:
      enabled: false
