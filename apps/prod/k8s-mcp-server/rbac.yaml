---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-mcp-crd-reader
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
      - podmonitors
      - prometheusrules
      - alertmanagers
      - prometheuses
      - prometheusagents
      - scrapeconfigs
    verbs: [get, list, watch]
  - apiGroups:
      - helm.toolkit.fluxcd.io
      - source.toolkit.fluxcd.io
      - kustomize.toolkit.fluxcd.io
      - notification.toolkit.fluxcd.io
      - image.toolkit.fluxcd.io
    resources: ["*"]
    verbs: [get, list, watch]
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
      - httproutes
      - grpcroutes
      - referencegrants
    verbs: [get, list, watch]
