---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-mcp-server
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kubernetes-mcp-server
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: kubernetes-mcp-server
        namespace: flux-system
      interval: 12h
  values:
    ingress:
      enabled: false  # set to true and configure hostname if you want external access via shared-gateway
