---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-mcp-server
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: ./charts/kubernetes-mcp-server
      sourceRef:
        kind: GitRepository
        name: kubernetes-mcp-server
        namespace: flux-system
      interval: 12h
  values:
    ingress:
      enabled: false
    rbac:
      extraClusterRoleBindings:
        - name: use-view
          roleRef:
            name: view
            external: true
