---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - hubble
  - podinfo
  - k8s-mcp-server
  - go-podcaster
  - open-webui
  - prometheus
  - postgres
  - pgadmin
  - snmp-exporter
  - grafana-mcp
  - searxng
  - postgres-backup

patches:
  - patch: |-
      - op: add
        path: /spec/targetNamespace
        value: prod
    target:
      kind: HelmRelease
