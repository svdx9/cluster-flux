---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: open-webui
      version: "13.0.1"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: flux-system
      interval: 12h
  values:
    replicaCount: 1
    ollama:
      enabled: false
    pipelines:
      enabled: false
    ingress:
      enabled: false
    service:
      type: ClusterIP
      ports:
        webui:
          port: 8080
          targetPort: 8080
    persistence:
      enabled: true
      size: 10Gi
      storageClass: iscsi
      accessModes:
        - ReadWriteOnce
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 12
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 6
    extraEnvVars:
      - name: WEBUI_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: openwebui-credentials
            key: WEBUI_SECRET_KEY
      - name: OPENWEBUI_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: application-db-credentials
            key: openwebui-db-password
      - name: DATABASE_URL
        value: "postgresql://openwebui:$(OPENWEBUI_DB_PASSWORD)@prod-postgres-postgresql.prod.svc.cluster.local:5432/openwebui"
      - name: ENABLE_DB_MIGRATIONS
        value: "true"
      - name: DEFAULT_USER_ROLE
        value: "user"
      # Skip first-boot model warmup
      - name: OFFLINE_MODE
        value: "true"
