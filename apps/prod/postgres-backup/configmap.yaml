---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-backup-scripts
  namespace: prod
data:
  dump.sh: |
    #!/bin/sh
    set -eo pipefail

    if [ -z "$POSTGRES_HOST" ]; then echo "ERROR: POSTGRES_HOST not set"; exit 1; fi
    if [ -z "$POSTGRES_USER" ]; then echo "ERROR: POSTGRES_USER not set"; exit 1; fi
    if [ -z "$PGPASSWORD" ]; then echo "ERROR: PGPASSWORD not set"; exit 1; fi

    POSTGRES_PORT="${POSTGRES_PORT:-5432}"
    DEST_FILE="/backup/all_$(date +"%Y-%m-%dT%H:%M:%SZ").sql.gz"

    echo "Creating dump of all databases from ${POSTGRES_HOST}..."
    pg_dumpall -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" | gzip > "$DEST_FILE"

    echo "$DEST_FILE" > /backup/latest
    echo "Dump complete: $DEST_FILE"

  upload.sh: |
    #!/bin/sh
    set -eo pipefail

    if [ -z "$S3_ACCESS_KEY_ID" ]; then echo "ERROR: S3_ACCESS_KEY_ID not set"; exit 1; fi
    if [ -z "$S3_SECRET_ACCESS_KEY" ]; then echo "ERROR: S3_SECRET_ACCESS_KEY not set"; exit 1; fi
    if [ -z "$S3_BUCKET" ]; then echo "ERROR: S3_BUCKET not set"; exit 1; fi
    if [ -z "$S3_ENDPOINT" ]; then echo "ERROR: S3_ENDPOINT not set"; exit 1; fi

    export AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID
    export AWS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY
    export AWS_DEFAULT_REGION="${S3_REGION:-us-east-1}"

    BACKUP_KEEP_LAST="${BACKUP_KEEP_LAST:-7}"
    PREFIX="${S3_PREFIX:+${S3_PREFIX}/}"

    SRC_FILE=$(cat /backup/latest)
    DEST_FILE=$(basename "$SRC_FILE")

    echo "Uploading ${DEST_FILE} to s3://${S3_BUCKET}/${PREFIX}..."
    aws --endpoint-url "$S3_ENDPOINT" s3 cp "$SRC_FILE" "s3://${S3_BUCKET}/${PREFIX}${DEST_FILE}" || exit 2
    echo "Upload complete"
    rm -f "$SRC_FILE"

    echo "Pruning: keeping last ${BACKUP_KEEP_LAST} backups..."
    aws --endpoint-url "$S3_ENDPOINT" s3 ls "s3://${S3_BUCKET}/${PREFIX}" \
      | awk '{print $4}' | sort | head -n "-${BACKUP_KEEP_LAST}" \
      | while read -r OLD; do
          echo "Deleting s3://${S3_BUCKET}/${PREFIX}${OLD}"
          aws --endpoint-url "$S3_ENDPOINT" s3 rm "s3://${S3_BUCKET}/${PREFIX}${OLD}"
        done
    echo "Pruning complete"
