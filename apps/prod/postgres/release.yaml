---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: "18.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h
  values:
    global:
      security:
        allowInsecureImages: true

    image:
      registry: docker.io
      repository: pgvector/pgvector
      tag: pg18
      pullPolicy: IfNotPresent

    primary:
      podSecurityContext:
        enabled: true
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999

      containerSecurityContext:
        enabled: true
        runAsUser: 999
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

      extraEnvVars:
        - name: GRAFANA_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-db-credentials
              key: grafana-db-password

      initdb:
        scripts:
          init-vector.sql: |
            CREATE EXTENSION IF NOT EXISTS vector;
          init-grafana.sh: |
            #!/bin/bash
            psql -U postgres -d postgres \
              -v grafana_password="$GRAFANA_DB_PASSWORD" \
              -c "CREATE USER IF NOT EXISTS grafana WITH PASSWORD :'grafana_password';"
            psql -U postgres -d postgres \
              -c "CREATE DATABASE grafana OWNER grafana;" || true

      persistence:
        enabled: true
        storageClass: iscsi
        accessModes:
          - ReadWriteOnce
        size: 50Gi

      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi

    auth:
      database: postgres
      existingSecret: postgres-credentials
      secretKeys:
        adminPasswordKey: postgres-password

    tls:
      enabled: false

    service:
      type: ClusterIP
      ports:
        postgresql: 5432

    readReplicas:
      replicaCount: 0

    metrics:
      enabled: false

    volumePermissions:
      enabled: true
      securityContext:
        runAsUser: "0"
