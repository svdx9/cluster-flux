---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "85.0.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
  targetNamespace: prod
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: prometheus-kube-prometheus-prometheus
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: '--web.basic-auth.users=/etc/prometheus/basic-auth/prometheus-users'
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: basic-auth
                  mountPath: /etc/prometheus/basic-auth
                  readOnly: true
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: basic-auth
                  secret:
                    secretName: prometheus-basic-auth
  values:
    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: iscsi
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 100Gi
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
    grafana:
      enabled: true
      deploymentStrategy:
        type: Recreate
      adminUser: admin
      admin:
        existingSecret: prometheus-grafana-admin
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: iscsi
        size: 10Gi
      service:
        port: 80
        targetPort: 3000
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: iscsi
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
    prometheus-node-exporter:
      enabled: true
    kube-state-metrics:
      enabled: true
