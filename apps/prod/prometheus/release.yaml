---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "85.0.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
  targetNamespace: prod
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: prometheus-kube-prometheus-prometheus
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: '--web.basic-auth.users=/etc/prometheus/basic-auth/prometheus-users'
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: basic-auth
                  mountPath: /etc/prometheus/basic-auth
                  readOnly: true
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: basic-auth
                  secret:
                    secretName: prometheus-basic-auth
  values:
    prometheus:
      prometheusSpec:
        enableAdminAPI: true
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: iscsi
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 100Gi
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        additionalScrapeConfigs:
          - job_name: nixos-bigpri-me
            static_configs:
              - targets: ["nixos.bigpri.me:9273"]
            relabel_configs:
              - source_labels: [__address__]
                regex: '([^:]+)(?::\d+)?'
                target_label: instance
                replacement: "$1"
          - job_name: opnsense-gw2
            static_configs:
              - targets: ["gw2.bigpri.me:9100"]
            relabel_configs:
              - source_labels: [__address__]
                regex: '([^:]+)(?::\d+)?'
                target_label: instance
                replacement: "$1"
          - job_name: truenas-tower
            static_configs:
              - targets: ["tower.bigpri.me:9100"]
            relabel_configs:
              - source_labels: [__address__]
                regex: '([^:]+)(?::\d+)?'
                target_label: instance
                replacement: "$1"
    grafana:
      enabled: true
      deploymentStrategy:
        type: RollingUpdate
      adminUser: admin
      admin:
        existingSecret: prometheus-grafana-admin
        passwordKey: admin-password
      persistence:
        enabled: false
      service:
        port: 80
        targetPort: 3000
      grafana.ini:
        database:
          type: postgres
          host: prod-postgres-postgresql.prod.svc.cluster.local:5432
          name: grafana
          user: grafana
          ssl_mode: disable
      envValueFrom:
        GF_DATABASE_PASSWORD:
          secretKeyRef:
            name: application-db-credentials
            key: grafana-db-password
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: iscsi
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
    prometheus-node-exporter:
      enabled: true
      prometheus:
        monitor:
          relabelings:
            - sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: instance
              replacement: $1
              action: replace
    kube-state-metrics:
      enabled: true
