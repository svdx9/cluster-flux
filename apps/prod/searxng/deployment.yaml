---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: prod
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      enableServiceLinks: false
      initContainers:
        - name: copy-config
          image: docker.io/searxng/searxng:2026.5.17-d7e8b7cd1
          command: ["cp", "/searxng-config/settings.yml", "/etc/searxng/settings.yml"]
          volumeMounts:
            - name: config-source
              mountPath: /searxng-config
            - name: config-dir
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:2026.5.17-d7e8b7cd1
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: secret-key
          volumeMounts:
            - name: config-dir
              mountPath: /etc/searxng
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config-source
          configMap:
            name: searxng-config
        - name: config-dir
          emptyDir: {}
