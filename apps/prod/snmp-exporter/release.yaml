---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snmp-exporter
  namespace: prod
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-snmp-exporter
      version: "9.14.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
      interval: 30m
  values:
    config: |
      auths:
        opnsense_auth:
          version: 3
          security_level: authPriv
          username: opnx
          password: ${OPNSENSE_SNMPV3_PASS}
          auth_protocol: SHA
          priv_protocol: AES
          priv_password: ${OPNSENSE_SNMPV3_KEY}
      modules:
        opnsense:
          walk:
            - 1.3.6.1.2.1.1.3       # sysUpTime
            - 1.3.6.1.2.1.2.2       # ifTable
            - 1.3.6.1.2.1.31.1.1    # ifXTable
          metrics:
            - name: sysUpTime
              oid: 1.3.6.1.2.1.1.3.0
              type: gauge
              help: Seconds since last reboot
            - name: ifOperStatus
              oid: 1.3.6.1.2.1.2.2.1.8
              type: gauge
              help: Current operational state of the interface
              indexes:
                - labelname: ifIndex
                  type: gauge
              lookups:
                - labels: [ifIndex]
                  labelname: ifDescr
                  oid: 1.3.6.1.2.1.2.2.1.2
                  type: DisplayString
            - name: ifInOctets
              oid: 1.3.6.1.2.1.2.2.1.10
              type: counter
              help: Number of octets received on the interface
              indexes:
                - labelname: ifIndex
                  type: gauge
              lookups:
                - labels: [ifIndex]
                  labelname: ifDescr
                  oid: 1.3.6.1.2.1.2.2.1.2
                  type: DisplayString
            - name: ifOutOctets
              oid: 1.3.6.1.2.1.2.2.1.16
              type: counter
              help: Number of octets transmitted out of the interface
              indexes:
                - labelname: ifIndex
                  type: gauge
              lookups:
                - labels: [ifIndex]
                  labelname: ifDescr
                  oid: 1.3.6.1.2.1.2.2.1.2
                  type: DisplayString
            - name: ifInErrors
              oid: 1.3.6.1.2.1.2.2.1.14
              type: counter
              help: Number of inbound packets with errors
              indexes:
                - labelname: ifIndex
                  type: gauge
              lookups:
                - labels: [ifIndex]
                  labelname: ifDescr
                  oid: 1.3.6.1.2.1.2.2.1.2
                  type: DisplayString
            - name: ifOutErrors
              oid: 1.3.6.1.2.1.2.2.1.20
              type: counter
              help: Number of outbound packets with errors
              indexes:
                - labelname: ifIndex
                  type: gauge
              lookups:
                - labels: [ifIndex]
                  labelname: ifDescr
                  oid: 1.3.6.1.2.1.2.2.1.2
                  type: DisplayString
            - name: ifHCInOctets
              oid: 1.3.6.1.2.1.31.1.1.1.6
              type: counter
              help: 64-bit version of ifInOctets
              indexes:
                - labelname: ifIndex
                  type: gauge
              lookups:
                - labels: [ifIndex]
                  labelname: ifName
                  oid: 1.3.6.1.2.1.31.1.1.1.1
                  type: DisplayString
            - name: ifHCOutOctets
              oid: 1.3.6.1.2.1.31.1.1.1.10
              type: counter
              help: 64-bit version of ifOutOctets
              indexes:
                - labelname: ifIndex
                  type: gauge
              lookups:
                - labels: [ifIndex]
                  labelname: ifName
                  oid: 1.3.6.1.2.1.31.1.1.1.1
                  type: DisplayString

    extraArgs: ["--config.expand-environment-variables"]
    envFrom:
      - secretRef:
          name: snmp-exporter-credentials

    serviceMonitor:
      enabled: true
      params:
        - name: opnsense-firewall
          target: 10.7.0.2
          module: [opnsense]
          auth: [opnsense_auth]
