---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snmp-exporter
  namespace: prod
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-snmp-exporter
      version: "9.14.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
      interval: 30m
  values:
    config: |
      auths:
        opnsense_auth:
          version: 3
          security_level: authPriv
          username: opnx
          password: ${OPNSENSE_SNMPV3_PASS}
          auth_protocol: SHA
          priv_protocol: AES
          priv_password: ${OPNSENSE_SNMPV3_KEY}
      modules:
        if_mib:
          walk:
            - ifDescr
            - ifType
            - ifSpeed
            - ifAdminStatus
            - ifOperStatus
            - ifHCInOctets
            - ifHCOutOctets
            - ifInErrors
            - ifOutErrors
            - ifInDiscards
            - ifOutDiscards

    extraArgs: ["--config.expand-environment-variables"]
    envFrom:
      - secretRef:
          name: snmp-exporter-credentials

    serviceMonitor:
      enabled: true
      params:
        - name: opnsense-firewall
          target: 10.7.0.2
          module: [if_mib]
          auth: [opnsense_auth]
