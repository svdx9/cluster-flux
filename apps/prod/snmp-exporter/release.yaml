---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snmp-exporter
  namespace: prod
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-snmp-exporter
      version: "9.14.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
      interval: 30m
  values:
    existingConfigMap: snmp-exporter-config
    extraArgs:
      - --config.expand-environment-variables
    envFrom:
      - secretRef:
          name: snmp-exporter-credentials
    serviceMonitor:
      enabled: false
