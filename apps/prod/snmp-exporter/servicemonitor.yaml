---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: snmp-opnsense
  namespace: prod
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-snmp-exporter
  endpoints:
    - port: http
      path: /snmp
      params:
        auth: [opnsense_auth]
        module: [opnsense]
        target: ["YOUR_OPNSENSE_IP"]
      interval: 60s
      scrapeTimeout: 30s
      relabelings:
        - sourceLabels: [__param_target]
          targetLabel: instance
        - targetLabel: __address__
          replacement: snmp-exporter-prometheus-snmp-exporter:9116
