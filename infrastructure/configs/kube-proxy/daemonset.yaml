---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-proxy
  namespace: kube-system
  labels:
    k8s-app: kube-proxy
    tier: node
spec:
  selector:
    matchLabels:
      k8s-app: kube-proxy
      tier: node
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        k8s-app: kube-proxy
        tier: node
    spec:
      hostNetwork: true
      priorityClassName: system-cluster-critical
      serviceAccountName: kube-proxy
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      containers:
        - name: kube-proxy
          image: registry.k8s.io/kube-proxy:v1.35.0
          command:
            - /usr/local/bin/kube-proxy
            - --cluster-cidr=10.244.0.0/16
            - --conntrack-max-per-core=0
            - --hostname-override=$(NODE_NAME)
            - --kubeconfig=/etc/kubernetes/kubeconfig
            - --proxy-mode=nftables
            - --metrics-bind-address=0.0.0.0:10249
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          securityContext:
            privileged: true
          volumeMounts:
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: ssl-certs-host
              mountPath: /etc/ssl/certs
              readOnly: true
            - name: kubeconfig
              mountPath: /etc/kubernetes
              readOnly: true
      volumes:
        - name: lib-modules
          hostPath:
            path: /usr/lib/modules
        - name: ssl-certs-host
          hostPath:
            path: /etc/ssl/certs
        - name: kubeconfig
          configMap:
            name: kubeconfig-in-cluster
            defaultMode: 420
