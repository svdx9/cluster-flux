---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metallb
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
      interval: 12h
  targetNamespace: metallb-system
  install:
    createNamespace: true
  values:
    controller:
      webhookMode: enabled
    speaker:
      tolerateMaster: true
    frr-k8s:
      prometheus:
        serviceMonitor:
          enabled: true
