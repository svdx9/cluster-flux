---
auths:
  snmp_user:
    version: 3
    security_level: authPriv
    username: snmp_exporter
    password: ${SNMPV3_PASS}
    auth_protocol: SHA
    priv_protocol: AES
    priv_password: ${SNMPV3_KEY}
modules:
  system:
    walk:
      - "SNMPv2-MIB::system"
    lookups:
      - source_indexes: [sysORIndex]
        lookup: "SNMPv2-MIB::sysORDescr"
  host:
    walk:
      - "HOST-RESOURCES-MIB::host"
    lookups:
      - source_indexes: [hrStorageIndex]
        lookup: "HOST-RESOURCES-MIB::hrStorageDescr"
      - source_indexes: [hrStorageIndex]
        lookup: "HOST-RESOURCES-MIB::hrStorageType"
      - source_indexes: [hrDeviceIndex]
        lookup: "HOST-RESOURCES-MIB::hrDeviceDescr"
      - source_indexes: [hrFSIndex]
        lookup: "HOST-RESOURCES-MIB::hrFSMountPoint"
    overrides:
      hrStorageDescr:
        ignore: true # Lookup label
      hrStorageType:
        ignore: true # Lookup label
      hrDeviceDescr:
        ignore: true # Lookup label
      hrFSMountPoint:
        ignore: true # Lookup label

  if_mib:
    walk:
      - "IF-MIB::interfaces"
      - "IF-MIB::ifXTable"
    lookups:
      - source_indexes: [ifIndex]
        lookup: "IF-MIB::ifAlias"
      - source_indexes: [ifIndex]
        # Disambiguate from PaloAlto PAN-COMMON-MIB::ifDescr.
        lookup: "IF-MIB::ifDescr"
      - source_indexes: [ifIndex]
        # Disambiguate from Netscaler NS-ROOT-MIB::ifName.
        lookup: "IF-MIB::ifName"
    overrides:
      ifAlias:
        ignore: true # Lookup metric
      ifDescr:
        ignore: true # Lookup metric
      ifName:
        ignore: true # Lookup metric
      ifType:
        type: EnumAsInfo
  opnsense:
    walk:
      - "OPENBSD-BASE-MIB::openBSD"
  truenas:
    walk:
      - "TRUENAS-MIB::trueNas"
