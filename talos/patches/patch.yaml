machine:
  install:
    disk: /dev/nvme0n1
  network:
    interfaces:
      - interface: enp0s31f6
        dhcp: true
        vip:
          ip: 10.7.2.9
cluster:
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
  proxy:
    extraArgs:
      metrics-bind-address: 0.0.0.0:10249
